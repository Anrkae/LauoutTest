<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Resultados - Claro Ret</title>
    <link rel="stylesheet" href="gestao.css">
</head>
<body class="dark-theme">
    <div class="container">
        <header>
            <h1>Consolidado de Operadores</h1>
            <p id="currentMonthDisplay"></p>
        </header>

        <div class="stats-overview">
            <div class="card">
                <span>Total Geral (Mês)</span>
                <h2 id="grandTotal">0</h2>
            </div>
            <div class="card">
                <span>Taxa Média</span>
                <h2 id="avgRate">0%</h2>
            </div>
        </div>

        <div class="table-container">
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>Operador</th>
                        <th>Diário (Hoje)</th>
                        <th>Semanal</th>
                        <th>Mensal</th>
                        <th>Taxa (Mês)</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>
    <script type="module" src="gestao.js"></script>
</body>
</html>
