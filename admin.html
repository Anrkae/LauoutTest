<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Resultados - Claro Ret</title>
    <link rel="stylesheet" href="gestao.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div class="container">
        <header>
            <div>
                <h1>Gestão de Operadores</h1>
                <p id="periodLabel">Exibindo resultados deste mês</p>
            </div>
            <div class="filter-area">
                <select id="periodFilter">
                    <option value="diario">Diário (Hoje)</option>
                    <option value="semanal">Semanal (Mês atual)</option>
                    <option value="mensal" selected>Mensal (Mês atual)</option>
                </select>
            </div>
        </header>

        <div class="table-container">
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>Operador</th>
                        <th>Atendidas</th>
                        <th>Cancelamentos</th>
                        <th>Taxa de Desconexão</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>
    <script type="module" src="gestao.js"></script>
</body>
</html>
