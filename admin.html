<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Painel Atendimentos</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
background:#f3f4f6;
margin:0;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
margin-bottom:20px;
}

.filters{
display:flex;
gap:10px;
margin-bottom:30px;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#e5e7eb;
font-weight:600;
}

button.active{
background:#2563eb;
color:white;
}

.cards{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.card h2{
margin:0;
font-size:16px;
color:#666;
}

.value{
font-size:40px;
font-weight:bold;
margin-top:10px;
}

</style>
</head>


<body>

<div class="container">

<h1>Painel de Retenção</h1>

<div class="filters">

<button id="btnDia" class="active" onclick="setFiltro('dia')">Diário</button>
<button id="btnSemana" onclick="setFiltro('semana')">Semanal</button>
<button id="btnMes" onclick="setFiltro('mes')">Mensal</button>

</div>

<div class="cards">

<div class="card">
<h2>Atendidas</h2>
<div class="value" id="total">0</div>
</div>

<div class="card">
<h2>Taxa Cancelamento</h2>
<div class="value" id="cancelamento">0%</div>
</div>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"


const firebaseConfig = {

apiKey: "AIzaSyA-f7KfWUq9bcusIHmqTpSDq0S-4rC7lqs",
authDomain: "claro-ret.firebaseapp.com",
projectId: "claro-ret",
storageBucket: "claro-ret.firebasestorage.app",
messagingSenderId: "218601890292",
appId: "1:218601890292:web:31e30552518c20ff8d19a1"

}


const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

let filtro = "dia"



function getTodayId(){

const d = new Date()

const year = d.getFullYear()
const month = String(d.getMonth()+1).padStart(2,"0")
const day = String(d.getDate()).padStart(2,"0")

return `${year}-${month}-${day}`

}



function getMesAtual(){

const d = new Date()

const year = d.getFullYear()
const month = String(d.getMonth()+1).padStart(2,"0")

return `${year}-${month}`

}



window.setFiltro = function(f){

filtro = f

document.querySelectorAll("button").forEach(b=>b.classList.remove("active"))

if(f==="dia") btnDia.classList.add("active")
if(f==="semana") btnSemana.classList.add("active")
if(f==="mes") btnMes.classList.add("active")

carregar()

}



async function carregar(){

let total = 0
let canceladas = 0

const atendimentos = collection(db,"atendimentos")

const snapshot = await getDocs(atendimentos)

const hoje = new Date()
const mesAtual = getMesAtual()


for(const diaDoc of snapshot.docs){

const diaId = diaDoc.id


if(!diaId.startsWith(mesAtual)) continue


const dataDia = new Date(diaId)


if(filtro==="dia"){

if(diaId !== getTodayId()) continue

}


if(filtro==="semana"){

const diff = (hoje - dataDia)/(1000*60*60*24)

if(diff > 7) continue

}


const operadores = collection(db,"atendimentos",diaId,"operadores")

const operadoresSnap = await getDocs(operadores)


for(const op of operadoresSnap.docs){

const ligacoes = collection(db,"atendimentos",diaId,"operadores",op.id,"ligacoes")

const ligSnap = await getDocs(ligacoes)


ligSnap.forEach(l=>{

const d = l.data()

total++

if(d.status==="Cancelado") canceladas++

})

}

}



let taxa = 0

if(total>0){

taxa = ((canceladas/total)*100).toFixed(1)

}

document.getElementById("total").innerText = total
document.getElementById("cancelamento").innerText = taxa+"%"

}


carregar()

</script>

</body>
</html>
