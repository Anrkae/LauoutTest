<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel Retenção</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 30px;
}

.hidden { display: none; }

.card {
    background: white;
    padding: 25px;
    border-radius: 14px;
    max-width: 500px;
    margin: auto;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
}

h2 { margin-top: 0; font-weight: 600; }

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: 500;
    width: 100%;
}

.primary { background: #2563eb; color: white; }
.danger { background: #ef4444; color: white; }

#historyList { margin-top: 20px; }

.history-item {
    padding: 10px 0;
    border-bottom: 1px solid #eee;
    font-size: 14px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="card">
    <h2>Login</h2>
    <input placeholder="Usuário">
    <input type="password" placeholder="Senha">
    <button class="primary" onclick="login()">Entrar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
    <div class="card">
        <h2>Retenção</h2>
        <button class="primary" onclick="openFloatingPanel()">Abrir painel</button>

        <h3 style="margin-top:25px;">Histórico</h3>
        <div id="historyList"></div>
    </div>
</div>

<script>
let pipWindow = null;
let callInterval = null;
let seconds = 0;
let callState = "disponivel";

let selectedResult = null;
let history = [];

/* LOGIN */

function login() {
    loginScreen.classList.add("hidden");
    dashboard.classList.remove("hidden");
}

/* HISTÓRICO */

function renderHistory() {
    historyList.innerHTML = "";
    history.forEach(item => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML =
            `<strong>${item.result}</strong>
             ${item.reason ? " • " + item.reason : ""}
             <br><small>${item.duration} • ${item.date}</small>`;
        historyList.appendChild(div);
    });
}

function addToHistory(duration, result, reason) {
    history.unshift({
        date: new Date().toLocaleString(),
        duration,
        result,
        reason
    });
    renderHistory();
}

/* TIMER */

function formatTime(sec) {
    const min = String(Math.floor(sec / 60)).padStart(2, "0");
    const s = String(sec % 60).padStart(2, "0");
    return `${min}:${s}`;
}

/* FLOATING PANEL */

async function openFloatingPanel() {

    if (!("documentPictureInPicture" in window)) {
        alert("Sem suporte.");
        return;
    }

    if (pipWindow && !pipWindow.closed) return;

    pipWindow = await window.documentPictureInPicture.requestWindow({
        width: 300,
        height: 300
    });

    pipWindow.document.body.innerHTML = `
        <style>
            body {
                font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
                background:white;
                margin:0;
                padding:16px;
                display:flex;
                flex-direction:column;
                gap:12px;
            }

            h3 { margin:0; font-weight:600; }

            .timer {
                font-size:28px;
                font-weight:600;
            }

            button {
                padding:12px;
                border-radius:10px;
                border:none;
                cursor:pointer;
                font-size:14px;
                width:100%;
            }

            .primary { background:#2563eb; color:white; }
            .danger { background:#ef4444; color:white; }

            .row {
                display:flex;
                gap:8px;
                width:100%;
            }

            .row button {
                flex:1;
            }

            select {
                width:100%;
                padding:10px;
                border-radius:8px;
                border:1px solid #ddd;
            }

            .hidden { display:none; }
        </style>

        <h3 id="statusTitle">Disponível</h3>

        <div id="timer" class="timer hidden">00:00</div>

        <button id="startBtn" class="primary">Atender</button>
        <button id="endBtn" class="danger hidden">Encerrar</button>

        <div id="acwArea" class="hidden">

            <div class="row">
                <button id="retidoBtn" class="primary">Retido</button>
                <button id="canceladoBtn" class="danger">Cancelado</button>
            </div>

            <select id="reasonSelect" class="hidden">
                <option value="">Selecione o motivo</option>
                <option>Atendimento</option>
                <option>Produto</option>
                <option>Técnico</option>
                <option>Mudança de endereço</option>
                <option>021</option>
            </select>

            <button id="confirmBtn" class="primary hidden">
                Confirmar
            </button>
        </div>
    `;

    bindPanel();
}

function bindPanel() {

    const doc = pipWindow.document;

    const statusTitle = doc.getElementById("statusTitle");
    const timer = doc.getElementById("timer");
    const startBtn = doc.getElementById("startBtn");
    const endBtn = doc.getElementById("endBtn");
    const acwArea = doc.getElementById("acwArea");
    const retidoBtn = doc.getElementById("retidoBtn");
    const canceladoBtn = doc.getElementById("canceladoBtn");
    const reasonSelect = doc.getElementById("reasonSelect");
    const confirmBtn = doc.getElementById("confirmBtn");

    /* ATENDER */

    startBtn.onclick = () => {

        callState = "atendendo";
        seconds = 0;

        statusTitle.textContent = "Em atendimento";

        startBtn.classList.add("hidden");
        timer.classList.remove("hidden");
        endBtn.classList.remove("hidden");

        callInterval = setInterval(() => {
            seconds++;
            timer.textContent = formatTime(seconds);
        }, 1000);
    };

    /* ENCERRAR */

    endBtn.onclick = () => {

        clearInterval(callInterval);
        callState = "acw";

        statusTitle.textContent = "Finalizar";
        endBtn.classList.add("hidden");

        acwArea.classList.remove("hidden");
    };

    /* RETIDO */

    retidoBtn.onclick = () => {
        selectedResult = "Retido";
        reasonSelect.classList.add("hidden");
        confirmBtn.classList.remove("hidden");
    };

    /* CANCELADO */

    canceladoBtn.onclick = () => {
        selectedResult = "Cancelado";
        reasonSelect.classList.remove("hidden");
        confirmBtn.classList.add("hidden");
    };

    /* MOTIVO */

    reasonSelect.onchange = () => {
        if (reasonSelect.value) {
            confirmBtn.classList.remove("hidden");
        } else {
            confirmBtn.classList.add("hidden");
        }
    };

    /* CONFIRMAR */

    confirmBtn.onclick = () => {

        if (!selectedResult) return;

        if (selectedResult === "Cancelado" && !reasonSelect.value) return;

        addToHistory(
            formatTime(seconds),
            selectedResult,
            selectedResult === "Retido" ? "" : reasonSelect.value
        );

        resetPanel();
    };
}

function resetPanel() {

    const doc = pipWindow.document;

    seconds = 0;
    callState = "disponivel";
    selectedResult = null;

    doc.getElementById("statusTitle").textContent = "Disponível";
    doc.getElementById("timer").textContent = "00:00";

    doc.getElementById("timer").classList.add("hidden");
    doc.getElementById("endBtn").classList.add("hidden");
    doc.getElementById("acwArea").classList.add("hidden");
    doc.getElementById("reasonSelect").classList.add("hidden");
    doc.getElementById("confirmBtn").classList.add("hidden");

    doc.getElementById("startBtn").classList.remove("hidden");
}

document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") {
        openFloatingPanel();
    }
});
</script>

</body>
</html>
