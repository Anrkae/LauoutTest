<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel Atendimento</title>
<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    margin: 0;
    padding: 20px;
}

.hidden { display: none; }

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    max-width: 400px;
    margin: auto;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
}

button {
    padding: 10px;
    width: 100%;
    cursor: pointer;
}

#historyList {
    margin-top: 20px;
}

.history-item {
    background: #fff;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 8px;
    font-size: 14px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="card">
    <h2>Login</h2>
    <input type="text" placeholder="Usuário">
    <input type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
    <div class="card">
        <h2>Painel de Atendimento</h2>
        <button onclick="openFloatingPanel()">Abrir Painel Flutuante</button>

        <h3>Histórico de Atendimentos</h3>
        <div id="historyList"></div>
    </div>
</div>

<script>
let pipWindow = null;
let callInterval = null;
let seconds = 0;
let callStartTime = null;

let callState = "disponivel"; // disponivel | atendendo
let history = [];

/* ================= LOGIN ================= */

function login() {
    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
}

/* ================= HISTÓRICO ================= */

function renderHistory() {
    const list = document.getElementById("historyList");
    list.innerHTML = "";

    history.forEach(item => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.textContent = `Data: ${item.date} | Duração: ${item.duration}`;
        list.appendChild(div);
    });
}

function addToHistory(duration) {
    const now = new Date();
    history.unshift({
        date: now.toLocaleString(),
        duration: duration
    });
    renderHistory();
}

/* ================= TIMER ================= */

function formatTime(sec) {
    const min = String(Math.floor(sec / 60)).padStart(2, "0");
    const s = String(sec % 60).padStart(2, "0");
    return `${min}:${s}`;
}

/* ================= FLOATING PANEL ================= */

async function openFloatingPanel() {

    if (!("documentPictureInPicture" in window)) {
        alert("Seu navegador não suporta Document Picture-in-Picture.");
        return;
    }

    if (pipWindow && !pipWindow.closed) return;

    pipWindow = await window.documentPictureInPicture.requestWindow({
        width: 320,
        height: 240
    });

    updatePanelUI();
}

function updatePanelUI() {

    if (!pipWindow) return;

    pipWindow.document.body.innerHTML = `
        <style>
            body {
                margin: 0;
                font-family: Arial;
                background: #111;
                color: white;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
            }

            #timer {
                font-size: 20px;
                margin: 10px 0;
            }

            button {
                padding: 10px;
                margin-top: 10px;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                width: 120px;
            }

            .green { background: #28a745; color: white; }
            .red { background: #dc3545; color: white; }
        </style>

        <h3>${callState === "disponivel" ? "🟢 Disponível" : "🔵 Atendendo"}</h3>
        <div id="timer">${callState === "atendendo" ? formatTime(seconds) : ""}</div>
        <button id="mainBtn" class="${callState === "disponivel" ? "green" : "red"}">
            ${callState === "disponivel" ? "Atender" : "Desligar"}
        </button>
    `;

    const mainBtn = pipWindow.document.getElementById("mainBtn");

    mainBtn.addEventListener("click", () => {
        if (callState === "disponivel") {
            startCall();
        } else {
            endCall();
        }
    });
}

/* ================= CALL LOGIC ================= */

function startCall() {
    callState = "atendendo";
    seconds = 0;
    callStartTime = new Date();

    callInterval = setInterval(() => {
        seconds++;
        updatePanelUI();
    }, 1000);

    updatePanelUI();
}

function endCall() {
    clearInterval(callInterval);

    const duration = formatTime(seconds);

    addToHistory(duration);

    callState = "disponivel";
    seconds = 0;

    updatePanelUI();
}

/* ================= AUTO ABRIR AO SAIR ================= */

document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") {
        openFloatingPanel();
    }
});
</script>

</body>
</html>
