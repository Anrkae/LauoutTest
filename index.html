<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Retenção</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f6f8;
margin:0;
padding:10px;
}

/* CARD */

.modal{
background:white;
border-radius:12px;
padding:16px;
box-shadow:0 5px 18px rgba(0,0,0,0.12);
max-width:320px;
margin:auto;
}

.modal h3{
margin:0 0 12px 0;
font-size:15px;
text-align:center;
}

/* DROPDOWN */

.dropdown{
margin-bottom:12px;
}

select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
background:white;
}

/* BUTTON GROUP */

.button-group{
display:flex;
gap:10px;
}

.btn{
flex:1;
border:none;
border-radius:8px;
padding:12px;
font-weight:bold;
cursor:pointer;
position:relative;
overflow:hidden;
transition:.2s;
}

.btn span{
display:block;
padding:2px;
}

.btn-retido{
background:#2ecc71;
color:white;
}

.btn-cancelado{
background:#e74c3c;
color:white;
}

/* confirmação */

.btn::before{
content:"";
position:absolute;
top:0;
left:0;
height:4px;
width:0%;
background:rgba(255,255,255,0.9);
transition:width .6s linear;
}

.btn.confirm::before{
width:100%;
}

</style>
</head>
<body>

<div class="modal">

<h3>Finalizar Atendimento</h3>

<div class="dropdown">
<select id="cancelReason">

<option value="">Motivo do cancelamento</option>
<option value="Atendimento">Atendimento</option>
<option value="Produto">Produto</option>
<option value="Técnico">Técnico</option>
<option value="Mudança de endereço">Mudança de endereço</option>
<option value="021">Cancelamento 021</option>

</select>
</div>

<div class="button-group">

<button class="btn btn-retido" id="btnRetido">
<span>Retido</span>
</button>

<button class="btn btn-cancelado" id="btnCancelado">
<span>Cancelado</span>
</button>

</div>

</div>

<script>

let confirmButton=null
let timeout=null

function resetConfirm(){

document.querySelectorAll(".btn").forEach(btn=>{
btn.classList.remove("confirm")
btn.querySelector("span").innerText =
btn.id==="btnRetido" ? "Retido" : "Cancelado"
})

confirmButton=null

}

function activateConfirm(button){

resetConfirm()

confirmButton=button

button.classList.add("confirm")
button.querySelector("span").innerText="Confirmar"

timeout=setTimeout(()=>{
resetConfirm()
},3000)

}

/* RETIDO */

document.getElementById("btnRetido").onclick=function(){

if(confirmButton===this){

alert("Cliente RETIDO")

resetConfirm()

}else{

activateConfirm(this)

}

}

/* CANCELADO */

document.getElementById("btnCancelado").onclick=function(){

const reason=document.getElementById("cancelReason").value

if(!reason){
alert("Selecione o motivo do cancelamento")
return
}

if(confirmButton===this){

alert("Cliente CANCELADO: "+reason)

resetConfirm()

}else{

activateConfirm(this)

}

}

/* cancelar confirmação clicando fora */

document.addEventListener("click",(e)=>{

if(!e.target.closest(".btn")){
resetConfirm()
}

})

</script>

</body>
</html>
