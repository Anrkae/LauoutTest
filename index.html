<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Painel Retenção</title>

<link rel="icon" type="image/png" href="icon.png">
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- LOGIN -->

<div id="loginScreen" class="card">

<h2>Login</h2>

<input id="matriculaInput" placeholder="Matrícula">

<button class="primary" onclick="login()">Entrar</button>

</div>


<!-- DASHBOARD -->

<div id="dashboard" class="hidden">

<div class="card">

<h2>Painel</h2>

<div id="operatorInfo"></div>

<button class="primary" onclick="openFloatingPanel()">
Abrir painel
</button>


<!-- RESULTADOS -->

<div class="resultados">

<div class="stats-card">

<div class="stats-number" id="statTotal">0</div>
<div class="stats-label">Atendidas</div>

</div>

<div class="stats-card">

<div class="stats-number" id="statRate">0%</div>
<div class="stats-label">Taxa de desc.</div>

</div>

</div>


<h3 style="margin-top:25px;">Histórico</h3>

<div id="historyList"></div>

</div>

</div>

<script type="module" src="firebase.js"></script>
<script src="script.js"></script>

</body>
</html>
