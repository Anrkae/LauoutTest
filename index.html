<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Retenção</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    margin:0;
    padding:20px;
}

/* LOGIN */
#loginScreen{
    max-width:300px;
    margin:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}
input{
    padding:8px;
    border:1px solid #ccc;
    border-radius:6px;
}
button{
    padding:8px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
.primary{background:#0057ff;color:#fff;}
.secondary{background:#ddd;}
.hidden{display:none}

/* DASHBOARD */
#dashboard{
    max-width:500px;
    margin:auto;
}
.status{
    padding:8px;
    border-radius:6px;
    font-weight:bold;
    margin-bottom:10px;
}
.disponivel{background:#d4f5dd;color:#067a2f;}
.atendendo{background:#fff4cc;color:#946200;}
.acw{background:#e3e3ff;color:#3a3a9f;}

.history{
    margin-top:20px;
}
.history-item{
    background:#fff;
    padding:8px;
    border-radius:6px;
    margin-bottom:6px;
    font-size:14px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
    <h3>Login Retenção</h3>
    <input placeholder="Usuário">
    <input placeholder="Senha" type="password">
    <button class="primary" onclick="login()">Entrar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
    <div id="statusLabel" class="status disponivel">Disponível</div>
    <button class="primary" onclick="openFloatingPanel()">Ativar Painel Flutuante</button>

    <div class="history">
        <h4>Histórico</h4>
        <div id="historyList"></div>
    </div>
</div>

<script>
let pipWindow = null;
let estado = "Disponível";
let timerInterval = null;
let tempo = 0;

function login(){
    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
}

function atualizarStatusUI(){
    const label = document.getElementById("statusLabel");
    label.className = "status " + estado.toLowerCase();
    label.innerText = estado;
}

function formatarTempo(seg){
    const m = String(Math.floor(seg/60)).padStart(2,'0');
    const s = String(seg%60).padStart(2,'0');
    return m+":"+s;
}

function iniciarTimer(){
    tempo = 0;
    timerInterval = setInterval(()=>{
        tempo++;
        if(pipWindow && pipWindow.document.getElementById("timer")){
            pipWindow.document.getElementById("timer").innerText = formatarTempo(tempo);
        }
    },1000);
}

function pararTimer(){
    clearInterval(timerInterval);
}

function registrarHistorico(resultado,motivo=""){
    const div = document.createElement("div");
    div.className = "history-item";
    div.innerText = `${resultado}${motivo? " - "+motivo:""} | ${formatarTempo(tempo)}`;
    document.getElementById("historyList").prepend(div);
}

async function openFloatingPanel(){
    if(pipWindow) return;

    pipWindow = await window.documentPictureInPicture.requestWindow({
        width:280,
        height:260
    });

    pipWindow.document.body.innerHTML = `
    <style>
    body{
        margin:0;
        font-family:Arial;
        background:#ffffff;
        padding:12px;
        box-sizing:border-box;
    }
    .status{
        font-size:14px;
        font-weight:bold;
        margin-bottom:6px;
    }
    .timer{
        font-size:20px;
        font-weight:bold;
        margin-bottom:10px;
    }
    button{
        width:100%;
        padding:8px;
        margin-bottom:6px;
        border:none;
        border-radius:6px;
        font-size:14px;
        cursor:pointer;
    }
    .primary{background:#0057ff;color:white;}
    .danger{background:#e53935;color:white;}
    .success{background:#2e7d32;color:white;}
    select{
        width:100%;
        padding:6px;
        border-radius:6px;
        margin-bottom:6px;
    }
    </style>

    <div class="status" id="status">Disponível</div>
    <div class="timer" id="timer">00:00</div>

    <button class="success" id="btnAtender">Atender</button>
    <button class="danger" id="btnDesligar" disabled>Desligar</button>

    <div id="acwArea" style="display:none;">
        <button class="success" id="btnRetido">Retido</button>
        <button class="danger" id="btnCancelado">Cancelado</button>

        <div id="cancelamentoArea" style="display:none;">
            <select id="motivo">
                <option value="">Selecione motivo</option>
                <option>Atendimento</option>
                <option>Produto</option>
                <option>Técnico</option>
                <option>Mudança de endereço</option>
                <option>021</option>
            </select>
            <button class="primary" id="btnConfirmar">Confirmar</button>
        </div>
    </div>
    `;

    const doc = pipWindow.document;

    doc.getElementById("btnAtender").onclick = () => {
        estado = "Atendendo";
        atualizarStatusUI();
        doc.getElementById("status").innerText = estado;
        doc.getElementById("btnDesligar").disabled = false;
        iniciarTimer();
    };

    doc.getElementById("btnDesligar").onclick = () => {
        pararTimer();
        estado = "ACW";
        atualizarStatusUI();
        doc.getElementById("status").innerText = estado;
        doc.getElementById("acwArea").style.display = "block";
    };

    doc.getElementById("btnRetido").onclick = () => {
        registrarHistorico("Retido");
        resetarEstado(doc);
    };

    doc.getElementById("btnCancelado").onclick = () => {
        doc.getElementById("cancelamentoArea").style.display = "block";
    };

    doc.getElementById("btnConfirmar").onclick = () => {
        const motivo = doc.getElementById("motivo").value;
        if(!motivo) return;
        registrarHistorico("Cancelado",motivo);
        resetarEstado(doc);
    };

    pipWindow.addEventListener("beforeunload",()=>{
        pipWindow = null;
    });
}

function resetarEstado(doc){
    estado = "Disponível";
    atualizarStatusUI();
    doc.getElementById("status").innerText = estado;
    doc.getElementById("timer").innerText = "00:00";
    doc.getElementById("btnDesligar").disabled = true;
    doc.getElementById("acwArea").style.display = "none";
}
</script>

</body>
</html>
