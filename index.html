<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Retenção</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
margin:0;
padding:20px;
}

/* painel */

.panel{
background:white;
padding:16px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
width:100%;
max-width:420px;
}

/* botões */

.btn{
padding:10px 16px;
margin:4px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
position:relative;
overflow:hidden;
transition:.2s;
}

.btn-primary{
background:#2f7df6;
color:white;
}

.btn-success{
background:#18a558;
color:white;
}

.btn-danger{
background:#e53935;
color:white;
}

.btn:hover{
opacity:.9;
}

/* confirmação */

.btn.confirming{
background:#555;
}

.btn.confirming::before{
content:"";
position:absolute;
top:0;
left:0;
height:3px;
width:100%;
background:white;
animation:loading 2s linear forwards;
}

@keyframes loading{
from{width:0%}
to{width:100%}
}

/* modal */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modal.show{
display:flex;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:360px;
}

/* dropdown */

select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

</style>
</head>

<body>

<div class="panel">

<h3>Atendimento</h3>

<button class="btn btn-primary" id="btnEncerrar">
Encerrar Atendimento
</button>

</div>


<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-content" id="modalContent">

<h3>Resultado do atendimento</h3>

<button class="btn btn-success actionBtn" data-type="retido">
Retido
</button>

<button class="btn btn-danger actionBtn" data-type="cancelado">
Cancelado
</button>

</div>

</div>



<script>

const modal = document.getElementById("modal")
const modalContent = document.getElementById("modalContent")

const btnEncerrar = document.getElementById("btnEncerrar")

/* abrir modal */

btnEncerrar.onclick = () => {

resetButtons()

modal.classList.add("show")

}


/* clique retido ou cancelado */

document.addEventListener("click",function(e){

if(!e.target.classList.contains("actionBtn")) return

const type = e.target.dataset.type

if(type === "retido"){
confirmButton(e.target)
}

if(type === "cancelado"){
showCancelReasons()
}

})


/* mostrar motivos */

function showCancelReasons(){

modalContent.innerHTML = `

<h3>Motivo do cancelamento</h3>

<select id="motivo">

<option value="">Selecione</option>
<option>Valor alto</option>
<option>Cliente insatisfeito</option>
<option>Problema técnico</option>
<option>Outro</option>

</select>

<button class="btn btn-danger" id="btnConcluir">
Concluir
</button>

`

document.getElementById("btnConcluir").onclick = function(){

const btn = this
const motivo = document.getElementById("motivo").value

if(!motivo){
alert("Selecione o motivo")
return
}

confirmButton(btn)

}

}


/* confirmação dinâmica */

function confirmButton(btn){

if(btn.classList.contains("confirming")){

console.log("AÇÃO CONFIRMADA")

resetButtons()

modal.classList.remove("show")

return

}

btn.classList.add("confirming")

const original = btn.innerText

btn.innerText = "Confirmar"

setTimeout(()=>{

if(btn.classList.contains("confirming")){
btn.classList.remove("confirming")
btn.innerText = original
}

},2000)

}


/* reset */

function resetButtons(){

document.querySelectorAll(".btn").forEach(btn=>{
btn.classList.remove("confirming")
})

}


/* fechar clicando fora */

modal.addEventListener("click",e=>{
if(e.target === modal){
modal.classList.remove("show")
resetButtons()
}
})

</script>

</body>
</html>
