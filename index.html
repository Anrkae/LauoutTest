<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel Retenção Moderno</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#eef2f7,#dfe9f3);
    margin: 0;
    padding: 30px;
}

.hidden { display: none; }

.card {
    background: white;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    max-width: 550px;
    margin: auto;
}

h2 { margin-top: 0; }

button {
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    background: #2563eb;
    color: white;
    transition: 0.2s;
}

button:hover { transform: translateY(-2px); }

#historyList {
    margin-top: 20px;
}

.history-item {
    background: #f9fafb;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 8px;
    font-size: 14px;
}
</style>
</head>
<body>

<div id="loginScreen" class="card">
    <h2>Login</h2>
    <input placeholder="Usuário" style="width:100%;padding:10px;margin-bottom:10px;">
    <input placeholder="Senha" type="password" style="width:100%;padding:10px;margin-bottom:15px;">
    <button onclick="login()" style="width:100%;">Entrar</button>
</div>

<div id="dashboard" class="hidden">
    <div class="card">
        <h2>Painel de Retenção</h2>
        <button onclick="openFloatingPanel()">Abrir Painel Flutuante</button>

        <h3>Histórico</h3>
        <div id="historyList"></div>
    </div>
</div>

<script>
let pipWindow = null;
let callInterval = null;
let seconds = 0;
let callState = "disponivel";
let history = [];

let selectedResult = null;
let selectedReason = null;

/* LOGIN */

function login() {
    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
}

/* HISTÓRICO */

function renderHistory() {
    const list = document.getElementById("historyList");
    list.innerHTML = "";

    history.forEach(item => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML =
            `<strong>${item.result}</strong> | ${item.reason} <br>
             ⏱ ${item.duration} | 📅 ${item.date}`;
        list.appendChild(div);
    });
}

function addToHistory(duration, result, reason) {
    history.unshift({
        date: new Date().toLocaleString(),
        duration,
        result,
        reason
    });
    renderHistory();
}

/* TIMER */

function formatTime(sec) {
    const min = String(Math.floor(sec / 60)).padStart(2, "0");
    const s = String(sec % 60).padStart(2, "0");
    return `${min}:${s}`;
}

/* FLOATING PANEL */

async function openFloatingPanel() {

    if (!("documentPictureInPicture" in window)) {
        alert("Sem suporte a Document PiP.");
        return;
    }

    if (pipWindow && !pipWindow.closed) return;

    pipWindow = await window.documentPictureInPicture.requestWindow({
        width: 340,
        height: 420
    });

    updatePanelUI();
}

function updatePanelUI() {

    if (!pipWindow) return;

    let content = "";

    if (callState === "disponivel") {
        content = `
            <div class="status disponivel">Disponível</div>
            <button class="primary" id="startBtn">Atender</button>
        `;
    }

    if (callState === "atendendo") {
        content = `
            <div class="status atendendo">Atendendo</div>
            <div class="timer">${formatTime(seconds)}</div>
            <button class="danger" id="endBtn">Encerrar</button>
        `;
    }

    if (callState === "acw") {
        content = `
            <div class="status acw">ACW</div>

            <div class="block-group" id="resultGroup">
                <div class="block" data-value="Retido">Retido</div>
                <div class="block cancel" data-value="Cancelado">Cancelado</div>
            </div>

            <div class="block-group hidden" id="reasonGroup">
                <div class="block" data-value="Atendimento">Atendimento</div>
                <div class="block" data-value="Produto">Produto</div>
                <div class="block" data-value="Técnico">Técnico</div>
                <div class="block" data-value="Mudança de endereço">Mudança</div>
                <div class="block special" data-value="021">021</div>
            </div>

            <button class="primary hidden" id="confirmBtn">Confirmar</button>
        `;
    }

    pipWindow.document.body.innerHTML = `
        <style>
            body {
                margin:0;
                padding:20px;
                font-family:'Segoe UI',sans-serif;
                background:#0f172a;
                color:white;
                display:flex;
                flex-direction:column;
                gap:15px;
            }

            .status {
                font-size:20px;
                font-weight:600;
            }

            .disponivel { color:#22c55e; }
            .atendendo { color:#3b82f6; }
            .acw { color:#a855f7; }

            .timer {
                font-size:32px;
                font-weight:700;
            }

            button {
                padding:12px;
                border:none;
                border-radius:12px;
                font-weight:600;
                cursor:pointer;
            }

            .primary { background:#2563eb; color:white; }
            .danger { background:#dc2626; color:white; }

            .block-group {
                display:grid;
                grid-template-columns:1fr 1fr;
                gap:10px;
            }

            .block {
                background:#1e293b;
                padding:12px;
                border-radius:12px;
                text-align:center;
                cursor:pointer;
                transition:0.2s;
                border:2px solid transparent;
            }

            .block:hover { transform:scale(1.05); }

            .block.active {
                border-color:#3b82f6;
                background:#1d4ed8;
            }

            .block.cancel.active {
                border-color:#ef4444;
                background:#7f1d1d;
            }

            .block.special {
                grid-column: span 2;
                background:#3f3f46;
            }

            .hidden { display:none; }
        </style>

        ${content}
    `;

    bindEvents();
}

function bindEvents() {

    if (!pipWindow) return;

    if (callState === "disponivel") {
        pipWindow.document.getElementById("startBtn")
            .addEventListener("click", startCall);
    }

    if (callState === "atendendo") {
        pipWindow.document.getElementById("endBtn")
            .addEventListener("click", goToACW);
    }

    if (callState === "acw") {

        const resultBlocks = pipWindow.document.querySelectorAll("#resultGroup .block");
        const reasonGroup = pipWindow.document.getElementById("reasonGroup");
        const confirmBtn = pipWindow.document.getElementById("confirmBtn");

        resultBlocks.forEach(block => {
            block.addEventListener("click", () => {

                resultBlocks.forEach(b => b.classList.remove("active"));
                block.classList.add("active");

                selectedResult = block.dataset.value;
                selectedReason = null;

                if (selectedResult === "Cancelado") {
                    reasonGroup.classList.remove("hidden");
                } else {
                    reasonGroup.classList.add("hidden");
                    confirmBtn.classList.remove("hidden");
                }
            });
        });

        pipWindow.document.querySelectorAll("#reasonGroup .block")
            .forEach(block => {
                block.addEventListener("click", () => {
                    pipWindow.document
                        .querySelectorAll("#reasonGroup .block")
                        .forEach(b => b.classList.remove("active"));

                    block.classList.add("active");
                    selectedReason = block.dataset.value;
                    confirmBtn.classList.remove("hidden");
                });
            });

        confirmBtn.addEventListener("click", finalizeCall);
    }
}

/* CALL FLOW */

function startCall() {
    callState = "atendendo";
    seconds = 0;

    callInterval = setInterval(() => {
        seconds++;
        if (callState === "atendendo") updatePanelUI();
    }, 1000);

    updatePanelUI();
}

function goToACW() {
    clearInterval(callInterval);
    callState = "acw";
    updatePanelUI();
}

function finalizeCall() {

    if (!selectedResult) return;

    if (selectedResult === "Cancelado" && !selectedReason) return;

    const duration = formatTime(seconds);

    addToHistory(
        duration,
        selectedResult,
        selectedResult === "Retido" ? "-" : selectedReason
    );

    seconds = 0;
    selectedResult = null;
    selectedReason = null;
    callState = "disponivel";

    updatePanelUI();
}

document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") {
        openFloatingPanel();
    }
});
</script>

</body>
</html>
