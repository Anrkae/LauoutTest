<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel Flutter</title>
</head>
<body>

<script>
let pipWindow = null;

async function openFloatingPanel() {

    if (!("documentPictureInPicture" in window)) {
        alert("Seu navegador não suporta Document Picture-in-Picture.");
        return;
    }

    // Evita abrir múltiplas janelas
    if (pipWindow && !pipWindow.closed) return;

    pipWindow = await window.documentPictureInPicture.requestWindow({
        width: 320,
        height: 240
    });

    pipWindow.document.body.innerHTML = `
        <style>
            body {
                margin: 0;
                font-family: Arial;
                background: #111;
                color: white;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
            }

            h3 {
                margin-bottom: 20px;
            }

            .buttons {
                display: flex;
                gap: 15px;
            }

            button {
                padding: 10px 15px;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-weight: bold;
            }

            .accept {
                background: #28a745;
                color: white;
            }

            .decline {
                background: #dc3545;
                color: white;
            }
        </style>

        <h3>📞 Ligação Recebida</h3>

        <div class="buttons">
            <button class="accept" id="btnAccept">Atender</button>
            <button class="decline" id="btnDecline">Desligar</button>
        </div>
    `;

    // Eventos dentro do PiP
    pipWindow.document.getElementById("btnAccept")
        .addEventListener("click", () => {
            console.log("Ligação atendida");
            // Aqui você pode chamar alguma função da página principal
            pipWindow.close();
        });

    pipWindow.document.getElementById("btnDecline")
        .addEventListener("click", () => {
            console.log("Ligação recusada");
            pipWindow.close();
        });

    // Quando fechar manualmente
    pipWindow.addEventListener("pagehide", () => {
        pipWindow = null;
    });
}

// Listener automático ao sair da aba
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") {
        openFloatingPanel();
    }
});
</script>

</body>
</html>
