<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel Retenção</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 30px;
}

.hidden { display: none; }

.card {
    background: white;
    padding: 25px;
    border-radius: 14px;
    max-width: 500px;
    margin: auto;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
}

h2 { margin-top: 0; font-weight: 600; }

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: 500;
}

.primary { background: #2563eb; color: white; }
.danger { background: #ef4444; color: white; }

#historyList { margin-top: 20px; }

.history-item {
    padding: 10px 0;
    border-bottom: 1px solid #eee;
    font-size: 14px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="card">
    <h2>Login</h2>
    <input placeholder="Usuário">
    <input type="password" placeholder="Senha">
    <button class="primary" style="width:100%;" onclick="login()">Entrar</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
    <div class="card">
        <h2>Retenção</h2>
        <button class="primary" onclick="openFloatingPanel()">Abrir painel</button>

        <h3 style="margin-top:25px;">Histórico</h3>
        <div id="historyList"></div>
    </div>
</div>

<script>
let pipWindow = null;
let callInterval = null;
let seconds = 0;
let callState = "disponivel";

let selectedResult = null;
let selectedReason = null;
let history = [];

/* LOGIN */

function login() {
    loginScreen.classList.add("hidden");
    dashboard.classList.remove("hidden");
}

/* HISTÓRICO */

function renderHistory() {
    historyList.innerHTML = "";
    history.forEach(item => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML =
            `<strong>${item.result}</strong>
             ${item.reason ? "• " + item.reason : ""}
             <br><small>${item.duration} • ${item.date}</small>`;
        historyList.appendChild(div);
    });
}

function addToHistory(duration, result, reason) {
    history.unshift({
        date: new Date().toLocaleString(),
        duration,
        result,
        reason
    });
    renderHistory();
}

/* TIMER */

function formatTime(sec) {
    const min = String(Math.floor(sec / 60)).padStart(2, "0");
    const s = String(sec % 60).padStart(2, "0");
    return `${min}:${s}`;
}

/* FLOATING PANEL */

async function openFloatingPanel() {

    if (!("documentPictureInPicture" in window)) {
        alert("Sem suporte.");
        return;
    }

    if (pipWindow && !pipWindow.closed) return;

    pipWindow = await window.documentPictureInPicture.requestWindow({
        width: 300,
        height: 330
    });

    pipWindow.document.body.innerHTML = `
        <style>
            body {
                font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
                background:white;
                margin:0;
                padding:18px;
                display:flex;
                flex-direction:column;
                gap:12px;
            }

            h3 { margin:0; font-weight:600; }

            .timer {
                font-size:28px;
                font-weight:600;
            }

            button {
                padding:12px;
                border-radius:10px;
                border:none;
                cursor:pointer;
                font-size:14px;
            }

            .primary { background:#2563eb; color:white; }
            .danger { background:#ef4444; color:white; }

            .blocks {
                display:flex;
                gap:8px;
            }

            .block {
                flex:1;
                padding:10px;
                border-radius:8px;
                border:1px solid #ddd;
                text-align:center;
                cursor:pointer;
                font-size:13px;
            }

            .block.active {
                border-color:#2563eb;
                background:#eff6ff;
            }

            .hidden { display:none; }
        </style>

        <h3 id="statusTitle">Disponível</h3>

        <div id="timer" class="timer hidden">00:00</div>

        <button id="startBtn" class="primary">Atender</button>
        <button id="endBtn" class="danger hidden">Encerrar</button>

        <div id="acwArea" class="hidden">
            <div class="blocks">
                <div class="block" data-value="Retido">Retido</div>
                <div class="block" data-value="Cancelado">Cancelado</div>
            </div>

            <div id="reasons" class="hidden" style="margin-top:8px;">
                <div class="block" data-value="Atendimento">Atendimento</div>
                <div class="block" data-value="Produto">Produto</div>
                <div class="block" data-value="Técnico">Técnico</div>
                <div class="block" data-value="Mudança de endereço">Mudança</div>
                <div class="block" data-value="021">021</div>
            </div>

            <button id="confirmBtn" class="primary hidden" style="margin-top:8px;">
                Confirmar
            </button>
        </div>
    `;

    bindPanel();
}

function bindPanel() {

    const doc = pipWindow.document;

    const statusTitle = doc.getElementById("statusTitle");
    const timer = doc.getElementById("timer");
    const startBtn = doc.getElementById("startBtn");
    const endBtn = doc.getElementById("endBtn");
    const acwArea = doc.getElementById("acwArea");
    const confirmBtn = doc.getElementById("confirmBtn");
    const reasons = doc.getElementById("reasons");

    startBtn.onclick = () => {

        callState = "atendendo";
        seconds = 0;

        statusTitle.textContent = "Em atendimento";

        startBtn.classList.add("hidden");
        timer.classList.remove("hidden");
        endBtn.classList.remove("hidden");

        callInterval = setInterval(() => {
            seconds++;
            timer.textContent = formatTime(seconds);
        }, 1000);
    };

    endBtn.onclick = () => {

        clearInterval(callInterval);
        callState = "acw";

        statusTitle.textContent = "Finalizar";
        endBtn.classList.add("hidden");

        acwArea.classList.remove("hidden");
    };

    doc.querySelectorAll(".blocks .block").forEach(block => {

        block.onclick = () => {

            doc.querySelectorAll(".block")
                .forEach(b => b.classList.remove("active"));

            block.classList.add("active");

            selectedResult = block.dataset.value;
            selectedReason = null;

            if (selectedResult === "Cancelado") {
                reasons.classList.remove("hidden");
                confirmBtn.classList.add("hidden");
            } else {
                reasons.classList.add("hidden");
                confirmBtn.classList.remove("hidden");
            }
        };
    });

    doc.querySelectorAll("#reasons .block")
        .forEach(block => {

            block.onclick = () => {

                doc.querySelectorAll("#reasons .block")
                    .forEach(b => b.classList.remove("active"));

                block.classList.add("active");
                selectedReason = block.dataset.value;
                confirmBtn.classList.remove("hidden");
            };
        });

    confirmBtn.onclick = () => {

        if (!selectedResult) return;
        if (selectedResult === "Cancelado" && !selectedReason) return;

        addToHistory(
            formatTime(seconds),
            selectedResult,
            selectedResult === "Retido" ? "" : selectedReason
        );

        resetPanel();
    };
}

function resetPanel() {

    const doc = pipWindow.document;

    seconds = 0;
    selectedResult = null;
    selectedReason = null;
    callState = "disponivel";

    doc.getElementById("statusTitle").textContent = "Disponível";
    doc.getElementById("timer").textContent = "00:00";

    doc.getElementById("timer").classList.add("hidden");
    doc.getElementById("endBtn").classList.add("hidden");
    doc.getElementById("acwArea").classList.add("hidden");
    doc.getElementById("confirmBtn").classList.add("hidden");
    doc.getElementById("reasons").classList.add("hidden");

    doc.getElementById("startBtn").classList.remove("hidden");

    doc.querySelectorAll(".block")
        .forEach(b => b.classList.remove("active"));
}

document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") {
        openFloatingPanel();
    }
});
</script>

</body>
</html>
