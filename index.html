<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel Flutter</title>
</head>
<body>

<script>
let pipWindow = null;
let callInterval = null;
let seconds = 0;
let callStarted = false;

function formatTime(sec) {
    const min = String(Math.floor(sec / 60)).padStart(2, "0");
    const s = String(sec % 60).padStart(2, "0");
    return `${min}:${s}`;
}

async function openFloatingPanel() {

    if (!("documentPictureInPicture" in window)) {
        alert("Seu navegador não suporta Document Picture-in-Picture.");
        return;
    }

    if (pipWindow && !pipWindow.closed) return;

    pipWindow = await window.documentPictureInPicture.requestWindow({
        width: 320,
        height: 260
    });

    pipWindow.document.body.innerHTML = `
        <style>
            body {
                margin: 0;
                font-family: Arial;
                background: #111;
                color: white;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
            }

            h3 {
                margin-bottom: 10px;
            }

            #timer {
                font-size: 22px;
                margin-bottom: 15px;
                opacity: 0.8;
            }

            .buttons {
                display: flex;
                gap: 15px;
            }

            button {
                padding: 10px 15px;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-weight: bold;
                min-width: 90px;
            }

            .accept {
                background: #28a745;
                color: white;
            }

            .decline {
                background: #dc3545;
                color: white;
            }
        </style>

        <h3 id="status">📞 Ligação Recebida</h3>
        <div id="timer">00:00</div>

        <div class="buttons">
            <button class="accept" id="btnAccept">Atender</button>
            <button class="decline" id="btnDecline">Desligar</button>
        </div>
    `;

    const status = pipWindow.document.getElementById("status");
    const timerEl = pipWindow.document.getElementById("timer");
    const btnAccept = pipWindow.document.getElementById("btnAccept");
    const btnDecline = pipWindow.document.getElementById("btnDecline");

    // BOTÃO ATENDER
    btnAccept.addEventListener("click", () => {
        if (callStarted) return;

        callStarted = true;
        status.textContent = "🟢 Em chamada";
        btnAccept.style.display = "none"; // Esconde botão atender

        seconds = 0;

        callInterval = setInterval(() => {
            seconds++;
            timerEl.textContent = formatTime(seconds);
        }, 1000);

        console.log("Ligação iniciada");
    });

    // BOTÃO DESLIGAR
    btnDecline.addEventListener("click", () => {
        console.log("Ligação encerrada");

        clearInterval(callInterval);
        callInterval = null;
        callStarted = false;

        pipWindow.close();
    });

    // Reset ao fechar
    pipWindow.addEventListener("pagehide", () => {
        clearInterval(callInterval);
        callInterval = null;
        callStarted = false;
        pipWindow = null;
    });
}

// Abre automaticamente ao sair da aba
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") {
        openFloatingPanel();
    }
});
</script>

</body>
</html>
