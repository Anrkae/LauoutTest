<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel Retenção</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
background:#f5f5f5;
margin:0;
padding:30px;
}

.hidden{display:none}

.card{
background:white;
padding:25px;
border-radius:14px;
max-width:500px;
margin:auto;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

button{
padding:12px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:500;
width:100%;
position:relative;
overflow:hidden;
margin-top:8px;
}

button::before{
content:"";
position:absolute;
top:0;
left:0;
height:4px;
width:0%;
background:rgba(255,255,255,0.9);
transition:width 2.5s linear;
}

button.confirm::before{
width:100%;
}

.primary{background:#2563eb;color:white}
.danger{background:#ef4444;color:white}

.row{
display:flex;
gap:8px;
margin-top:8px;
}

.row button{
flex:1;
}

.timer{
font-size:26px;
font-weight:600;
margin:10px 0;
}

.panel{
background:white;
border-radius:12px;
padding:14px;
margin-top:20px;
max-width:300px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

select{
padding:10px;
border-radius:8px;
border:1px solid #ddd;
width:100%;
margin-top:10px;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
display:flex;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:18px;
border-radius:12px;
width:260px;
}

.history-item{
padding:10px 0;
border-bottom:1px solid #eee;
font-size:14px;
}

</style>
</head>
<body>

<!-- LOGIN -->

<div id="loginScreen" class="card">
<h2>Login</h2>
<input placeholder="Usuário">
<input type="password" placeholder="Senha">
<button class="primary" onclick="login()">Entrar</button>
</div>

<!-- DASHBOARD -->

<div id="dashboard" class="hidden">

<div class="card">

<h2>Retenção</h2>

<button class="primary" onclick="openFloatingPanel()">Abrir painel</button>

<div id="panelContainer"></div>

<h3 style="margin-top:25px;">Histórico</h3>
<div id="historyList"></div>

</div>
</div>

<!-- MODAL -->

<div id="modal" class="modal hidden">

<div class="modal-box">

<div id="modalStep1">

<div class="row">
<button id="retidoBtn" class="primary">Retido</button>
<button id="canceladoBtn" class="danger">Cancelado</button>
</div>

</div>

<div id="modalStep2" class="hidden">

<select id="reason">
<option value="">Motivo cancelamento</option>
<option>Atendimento</option>
<option>Produto</option>
<option>Técnico</option>
<option>Mudança de endereço</option>
<option>021</option>
</select>

<button id="confirmCancel" class="danger">Concluir</button>

</div>

</div>

</div>

<script>

let pipWindow
let callInterval
let seconds=0

let confirmButton=null
let confirmTimer=null

let history=[]

/* LOGIN */

function login(){
loginScreen.classList.add("hidden")
dashboard.classList.remove("hidden")
renderPanel()
}

/* HISTÓRICO */

function renderHistory(){

historyList.innerHTML=""

history.forEach(item=>{

const div=document.createElement("div")

div.className="history-item"

div.innerHTML=`
<strong>${item.result}</strong>
${item.reason?" • "+item.reason:""}
<br><small>${item.duration} • ${item.date}</small>
`

historyList.appendChild(div)

})

}

function addToHistory(duration,result,reason){

history.unshift({
date:new Date().toLocaleString(),
duration,
result,
reason
})

renderHistory()

}

/* TIMER */

function formatTime(sec){

const m=String(Math.floor(sec/60)).padStart(2,"0")
const s=String(sec%60).padStart(2,"0")

return `${m}:${s}`

}

/* CONFIRM BUTTON */

function startConfirm(btn){

resetConfirm()

confirmButton=btn

btn.classList.add("confirm")
btn.dataset.original=btn.innerText
btn.innerText="Confirmar"

confirmTimer=setTimeout(resetConfirm,2500)

}

function resetConfirm(){

if(!confirmButton) return

confirmButton.classList.remove("confirm")
confirmButton.innerText=confirmButton.dataset.original

confirmButton=null
clearTimeout(confirmTimer)

}

/* PANEL */

function renderPanel(){

panelContainer.innerHTML=`

<div class="panel">

<h3 id="status">Disponível</h3>

<div id="timer" class="timer hidden">00:00</div>

<button id="startBtn" class="primary">Atender</button>

<button id="endBtn" class="danger hidden">Encerrar</button>

</div>

`

bindPanel(document)

}

/* PANEL LOGIC */

function bindPanel(doc){

const status=doc.getElementById("status")
const timer=doc.getElementById("timer")

const startBtn=doc.getElementById("startBtn")
const endBtn=doc.getElementById("endBtn")

startBtn.onclick=()=>{

seconds=0

status.textContent="Em atendimento"

startBtn.classList.add("hidden")
timer.classList.remove("hidden")
endBtn.classList.remove("hidden")

callInterval=setInterval(()=>{
seconds++
timer.textContent=formatTime(seconds)
},1000)

}

endBtn.onclick=()=>{

clearInterval(callInterval)

status.textContent="Finalizando"

modal.classList.remove("hidden")

}

}

/* MODAL */

retidoBtn.onclick=()=>{

if(confirmButton===retidoBtn){

addToHistory(formatTime(seconds),"Retido","")
closeModal()

}else{

startConfirm(retidoBtn)

}

}

canceladoBtn.onclick=()=>{

modalStep1.classList.add("hidden")
modalStep2.classList.remove("hidden")

}

confirmCancel.onclick=()=>{

if(!reason.value){
alert("Selecione o motivo")
return
}

if(confirmButton===confirmCancel){

addToHistory(formatTime(seconds),"Cancelado",reason.value)

closeModal()

}else{

startConfirm(confirmCancel)

}

}

/* CLOSE */

function closeModal(){

modal.classList.add("hidden")

modalStep1.classList.remove("hidden")
modalStep2.classList.add("hidden")

reason.value=""

resetPanel()

}

/* RESET */

function resetPanel(){

seconds=0

const status=document.getElementById("status")
const timer=document.getElementById("timer")
const startBtn=document.getElementById("startBtn")
const endBtn=document.getElementById("endBtn")

status.textContent="Disponível"

timer.textContent="00:00"

timer.classList.add("hidden")
endBtn.classList.add("hidden")

startBtn.classList.remove("hidden")

resetConfirm()

}

/* PIP */

async function openFloatingPanel(){

if(!("documentPictureInPicture" in window)){
alert("Sem suporte")
return
}

if(pipWindow && !pipWindow.closed) return

pipWindow=await documentPictureInPicture.requestWindow({
width:300,
height:320
})

pipWindow.document.body.innerHTML=panelContainer.innerHTML

bindPanel(pipWindow.document)

}

/* AUTO PIP */

document.addEventListener("visibilitychange",()=>{

if(document.visibilityState==="hidden"){
openFloatingPanel()
}

})

</script>

</body>
</html>
