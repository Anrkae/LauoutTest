<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel Retenção</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 30px;
}

.hidden { display: none; }

.card {
    background: white;
    padding: 25px;
    border-radius: 14px;
    max-width: 500px;
    margin: auto;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
}

h2 {
    margin-top: 0;
    font-weight: 600;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: 500;
}

.primary { background: #2563eb; color: white; }
.danger { background: #ef4444; color: white; }

#historyList {
    margin-top: 20px;
}

.history-item {
    padding: 10px 0;
    border-bottom: 1px solid #eee;
    font-size: 14px;
}
</style>
</head>
<body>

<div id="loginScreen" class="card">
    <h2>Login</h2>
    <input placeholder="Usuário">
    <input type="password" placeholder="Senha">
    <button class="primary" style="width:100%;" onclick="login()">Entrar</button>
</div>

<div id="dashboard" class="hidden">
    <div class="card">
        <h2>Retenção</h2>
        <button class="primary" onclick="openFloatingPanel()">Abrir painel</button>

        <h3 style="margin-top:25px;">Histórico</h3>
        <div id="historyList"></div>
    </div>
</div>

<script>
let pipWindow = null;
let callInterval = null;
let seconds = 0;
let callState = "disponivel";

let selectedResult = null;
let selectedReason = null;
let history = [];

/* LOGIN */

function login() {
    loginScreen.classList.add("hidden");
    dashboard.classList.remove("hidden");
}

/* HISTÓRICO */

function renderHistory() {
    historyList.innerHTML = "";
    history.forEach(item => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML =
            `<strong>${item.result}</strong>
             ${item.reason ? "• " + item.reason : ""}
             <br><small>${item.duration} • ${item.date}</small>`;
        historyList.appendChild(div);
    });
}

function addToHistory(duration, result, reason) {
    history.unshift({
        date: new Date().toLocaleString(),
        duration,
        result,
        reason
    });
    renderHistory();
}

/* TIMER */

function formatTime(sec) {
    const min = String(Math.floor(sec / 60)).padStart(2, "0");
    const s = String(sec % 60).padStart(2, "0");
    return `${min}:${s}`;
}

/* FLOATING PANEL */

async function openFloatingPanel() {

    if (!("documentPictureInPicture" in window)) {
        alert("Sem suporte.");
        return;
    }

    if (pipWindow && !pipWindow.closed) return;

    pipWindow = await window.documentPictureInPicture.requestWindow({
        width: 320,
        height: 380
    });

    updatePanel();
}

function updatePanel() {

    if (!pipWindow) return;

    let content = "";

    if (callState === "disponivel") {
        content = `
            <h3>Disponível</h3>
            <button class="primary" id="start">Atender</button>
        `;
    }

    if (callState === "atendendo") {
        content = `
            <h3>Em atendimento</h3>
            <div style="font-size:28px;font-weight:600;">${formatTime(seconds)}</div>
            <button class="danger" id="end">Encerrar</button>
        `;
    }

    if (callState === "acw") {
        content = `
            <h3>Finalizar atendimento</h3>

            <div class="blocks">
                <div class="block" data-value="Retido">Retido</div>
                <div class="block cancel" data-value="Cancelado">Cancelado</div>
            </div>

            <div id="reasons" class="hidden">
                <div class="block small" data-value="Atendimento">Atendimento</div>
                <div class="block small" data-value="Produto">Produto</div>
                <div class="block small" data-value="Técnico">Técnico</div>
                <div class="block small" data-value="Mudança de endereço">Mudança</div>
                <div class="block small" data-value="021">021</div>
            </div>

            <button class="primary hidden" id="confirm">Confirmar</button>
        `;
    }

    pipWindow.document.body.innerHTML = `
        <style>
            body {
                font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
                background:white;
                margin:0;
                padding:20px;
                display:flex;
                flex-direction:column;
                gap:15px;
            }

            h3 { margin:0; font-weight:600; }

            button {
                padding:12px;
                border-radius:10px;
                border:none;
                cursor:pointer;
                font-size:15px;
            }

            .primary { background:#2563eb; color:white; }
            .danger { background:#ef4444; color:white; }

            .blocks {
                display:flex;
                gap:10px;
            }

            .block {
                flex:1;
                padding:12px;
                border-radius:10px;
                border:1px solid #ddd;
                text-align:center;
                cursor:pointer;
                font-size:14px;
            }

            .block.small { margin-top:8px; }

            .block.active {
                border-color:#2563eb;
                background:#eff6ff;
            }

            .hidden { display:none; }
        </style>

        ${content}
    `;

    bindPanelEvents();
}

function bindPanelEvents() {

    if (!pipWindow) return;

    if (callState === "disponivel") {
        pipWindow.document.getElementById("start")
            .addEventListener("click", startCall);
    }

    if (callState === "atendendo") {
        pipWindow.document.getElementById("end")
            .addEventListener("click", goToACW);
    }

    if (callState === "acw") {

        const resultBlocks = pipWindow.document.querySelectorAll(".blocks .block");
        const reasons = pipWindow.document.getElementById("reasons");
        const confirm = pipWindow.document.getElementById("confirm");

        resultBlocks.forEach(block => {
            block.addEventListener("click", () => {

                resultBlocks.forEach(b => b.classList.remove("active"));
                block.classList.add("active");

                selectedResult = block.dataset.value;
                selectedReason = null;

                if (selectedResult === "Cancelado") {
                    reasons.classList.remove("hidden");
                } else {
                    reasons.classList.add("hidden");
                    confirm.classList.remove("hidden");
                }
            });
        });

        pipWindow.document.querySelectorAll("#reasons .block")
            .forEach(block => {
                block.addEventListener("click", () => {
                    pipWindow.document.querySelectorAll("#reasons .block")
                        .forEach(b => b.classList.remove("active"));

                    block.classList.add("active");
                    selectedReason = block.dataset.value;
                    confirm.classList.remove("hidden");
                });
            });

        confirm.addEventListener("click", finalizeCall);
    }
}

/* CALL FLOW */

function startCall() {
    callState = "atendendo";
    seconds = 0;

    callInterval = setInterval(() => {
        seconds++;
        if (callState === "atendendo") updatePanel();
    }, 1000);

    updatePanel();
}

function goToACW() {
    clearInterval(callInterval);
    callState = "acw";
    updatePanel();
}

function finalizeCall() {

    if (!selectedResult) return;
    if (selectedResult === "Cancelado" && !selectedReason) return;

    addToHistory(
        formatTime(seconds),
        selectedResult,
        selectedResult === "Retido" ? "" : selectedReason
    );

    seconds = 0;
    selectedResult = null;
    selectedReason = null;
    callState = "disponivel";

    updatePanel();
}

document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") {
        openFloatingPanel();
    }
});
</script>

</body>
</html>
