<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Painel Retenção</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- LOGIN -->

<div id="loginScreen" class="card">

<h2>Login</h2>

<input id="matriculaInput" placeholder="Matrícula">

<button class="primary" onclick="login()">Entrar</button>

</div>


<!-- DASHBOARD -->

<div id="dashboard" class="hidden">

<div class="card">

<h2>Painel Retenção</h2>

<div id="operatorInfo"></div>

<button class="primary" onclick="openFloatingPanel()">
Abrir painel
</button>

<span id="statTotal"></span>
<span id="statRate"></span>

<h3 style="margin-top:25px;">Histórico</h3>

<div id="historyList"></div>

</div>

</div>

<script type="module" src="firebase.js"></script>
<script src="script.js"></script>

</body>
</html>
